name: Deploy Static Website to AWS S3

on:
  push:
    branches:
      - main # Change this to your branch name (e.g., dev) if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository files
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # 2. Configure AWS credentials using GitHub Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3. Upload website files to S3 (Requirement 7)
    - name: Sync Website Files to S3
      run: |
        aws s3 sync website/ s3://${{ secrets.S3_BUCKET }} --delete

